<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GrimWar - Wizard Arena Combat. Battle other wizards in this multiplayer arena game." />
  <link rel="canonical" href="https://grimwar.net/" />
  <meta property="og:title" content="GrimWar - Wizard Arena Combat" />
  <meta property="og:description" content="Battle other wizards in this multiplayer arena game with spells, upgrades, and roguelike mechanics." />
  <meta property="og:url" content="https://grimwar.net/" />
  <meta property="og:type" content="website" />
  <title>GrimWar</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1411251953532308" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #game-container { position: relative; }

    /* Lobby overlay */
    #lobby {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 30, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: #e0e0e0;
    }
    #lobby.hidden { display: none; }
    .lobby-panel {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 400px;
    }
    .lobby-panel h1 {
      color: #e94560;
      font-size: 2.5em;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }
    .lobby-panel .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9em;
    }
    .lobby-panel input {
      background: #0f3460;
      border: 1px solid #e94560;
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 1em;
      width: 100%;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 2px;
    }
    .lobby-panel input::placeholder {
      color: #666;
      letter-spacing: normal;
    }
    .lobby-panel button:not(.mode-btn) {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 1.1em;
      cursor: pointer;
      margin: 6px;
      transition: background 0.2s;
    }
    .lobby-panel button:not(.mode-btn):hover { background: #c73652; }
    .lobby-panel button:not(.mode-btn):disabled {
      background: #555;
      cursor: not-allowed;
    }
    /* Mode toggle buttons */
    .mode-btn {
      padding: 10px 20px;
      font-size: 0.9em;
      min-width: 120px;
      cursor: pointer;
      border: 2px solid #e94560;
      transition: background 0.2s, color 0.2s;
      margin: 0;
    }
    .mode-btn:hover {
      filter: brightness(1.15);
    }
    #btn-mode-roguelike {
      border-radius: 6px 0 0 6px;
    }
    #btn-mode-arena {
      border-radius: 0 6px 6px 0;
      border-left: none;
    }
    #lobby-status {
      margin-top: 16px;
      min-height: 24px;
      color: #aaa;
      font-size: 0.9em;
    }
    #game-code-display {
      font-size: 2em;
      color: #e94560;
      letter-spacing: 4px;
      margin: 12px 0;
      font-weight: bold;
    }
    #player-list {
      text-align: left;
      margin: 16px 0;
      padding: 0;
      list-style: none;
    }
    #player-list li {
      padding: 6px 12px;
      background: #0f3460;
      margin: 4px 0;
      border-radius: 4px;
      font-size: 0.95em;
    }
    #player-list li .host-badge {
      color: #e94560;
      font-size: 0.8em;
      margin-left: 8px;
    }
    .lobby-section { margin: 16px 0; }

    /* Name input */
    #name-input {
      letter-spacing: normal !important;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Lobby UI -->
  <div id="lobby">
    <div class="lobby-panel">
      <h1>GrimWar</h1>
      <p class="subtitle">Wizard Arena Combat</p>

      <div class="lobby-section">
        <input type="text" id="name-input" placeholder="Enter your wizard name" maxlength="16" />
        <button id="btn-customize" style="background:#0f3460; border:1px solid #4fc3f7; color:#4fc3f7; padding:6px 16px; border-radius:4px; font-size:0.8em; cursor:pointer; margin-top:6px;">Customize Wizard</button>
      </div>

      <!-- Character editor (hidden initially) -->
      <div id="customize-section" style="display:none; margin:12px 0; text-align:left; max-width:400px; margin-left:auto; margin-right:auto;">
        <!-- Preview canvas -->
        <div style="text-align:center; margin-bottom:10px;">
          <canvas id="wizard-preview" width="120" height="120" style="background:#1a1a2e; border:1px solid #333; border-radius:8px;"></canvas>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
          <div>
            <label style="color:#888; font-size:0.75em;">Hat</label>
            <select id="cosmetic-hat" style="width:100%; background:#0f3460; color:#fff; border:1px solid #e94560; padding:5px; border-radius:4px; font-size:0.85em;">
              <option value="classic">Classic Wizard</option>
              <option value="crown">Crown</option>
              <option value="horns">Horns</option>
              <option value="halo">Halo</option>
              <option value="tophat">Top Hat</option>
              <option value="beanie">Beanie</option>
              <option value="antenna">Antenna</option>
              <option value="mohawk">Mohawk</option>
              <option value="cat_ears">Cat Ears</option>
              <option value="pirate">Pirate Hat</option>
              <option value="chef">Chef Hat</option>
              <option value="none">No Hat</option>
            </select>
          </div>
          <div>
            <label style="color:#888; font-size:0.75em;">Eyes</label>
            <select id="cosmetic-eyes" style="width:100%; background:#0f3460; color:#fff; border:1px solid #e94560; padding:5px; border-radius:4px; font-size:0.85em;">
              <option value="normal">Normal</option>
              <option value="angry">Angry</option>
              <option value="cyclops">Cyclops</option>
              <option value="closed">Zen</option>
              <option value="glowing">Glowing</option>
              <option value="x_eyes">X Eyes</option>
              <option value="hearts">Heart Eyes</option>
              <option value="tiny">Tiny</option>
              <option value="wide">Wide</option>
            </select>
          </div>
          <div>
            <label style="color:#888; font-size:0.75em;">Mouth</label>
            <select id="cosmetic-mouth" style="width:100%; background:#0f3460; color:#fff; border:1px solid #e94560; padding:5px; border-radius:4px; font-size:0.85em;">
              <option value="none">None</option>
              <option value="smile">Smile</option>
              <option value="grin">Grin</option>
              <option value="frown">Frown</option>
              <option value="fangs">Fangs</option>
              <option value="tongue">Tongue</option>
              <option value="mustache">Mustache</option>
            </select>
          </div>
          <div>
            <label style="color:#888; font-size:0.75em;">Trail</label>
            <select id="cosmetic-trail" style="width:100%; background:#0f3460; color:#fff; border:1px solid #e94560; padding:5px; border-radius:4px; font-size:0.85em;">
              <option value="none">None</option>
              <option value="fire">Fire</option>
              <option value="ice">Ice</option>
              <option value="shadow">Shadow</option>
              <option value="rainbow">Rainbow</option>
              <option value="poison">Poison</option>
              <option value="electric">Electric</option>
              <option value="blood">Blood</option>
              <option value="gold">Gold</option>
              <option value="void">Void</option>
            </select>
          </div>
          <div>
            <label style="color:#888; font-size:0.75em;">Aura</label>
            <select id="cosmetic-aura" style="width:100%; background:#0f3460; color:#fff; border:1px solid #e94560; padding:5px; border-radius:4px; font-size:0.85em;">
              <option value="none">None</option>
              <option value="flame">Flame</option>
              <option value="frost">Frost</option>
              <option value="dark">Dark</option>
              <option value="holy">Holy</option>
              <option value="electric">Electric</option>
              <option value="nature">Nature</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Mode selection -->
      <div id="mode-selector" style="margin:0 0 12px 0; display:flex; gap:0; justify-content:center;">
        <button id="btn-mode-roguelike" class="mode-btn" style="background:#e94560; color:#fff;">Roguelike</button>
        <button id="btn-mode-arena" class="mode-btn" style="background:transparent; color:#e94560;">Arena</button>
      </div>
      <p id="mode-description" style="color:#666; font-size:0.8em; margin-bottom:16px; min-height:2.4em; line-height:1.2em;">
        Earn upgrades between rounds — losers choose a powerup
      </p>

      <!-- Initial buttons -->
      <div id="lobby-menu">
        <button id="btn-host">Host Game</button>
        <button id="btn-join">Join Game</button>
        <br/>
        <button id="btn-test" style="background:#0f3460; margin-top:12px; font-size:0.9em;">Test Mode (Solo + Bots)</button>
      </div>

      <!-- Join input (hidden initially) -->
      <div id="join-section" style="display:none;">
        <input type="text" id="join-code-input" placeholder="Enter game code" maxlength="8" />
        <button id="btn-join-confirm">Connect</button>
        <button id="btn-back" style="background:#555;">Back</button>
      </div>

      <!-- Host waiting room (hidden initially) -->
      <div id="host-section" style="display:none;">
        <p style="color:#888; font-size:0.85em;">Share this code with other players:</p>
        <div id="game-code-display"></div>
        <ul id="player-list"></ul>
        <button id="btn-start" disabled>Start Game</button>
      </div>

      <!-- Client waiting room -->
      <div id="client-section" style="display:none;">
        <p style="color:#888;">Waiting for host to start...</p>
        <ul id="client-player-list"></ul>
      </div>

      <div id="lobby-status"></div>
      <a href="/privacy.html" target="_blank" style="color:#555; font-size:0.7em; margin-top:12px; display:inline-block;">Privacy Policy</a>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
