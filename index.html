<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrimWar</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #game-container { position: relative; }

    /* Lobby overlay */
    #lobby {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 30, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: #e0e0e0;
    }
    #lobby.hidden { display: none; }
    .lobby-panel {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 400px;
    }
    .lobby-panel h1 {
      color: #e94560;
      font-size: 2.5em;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }
    .lobby-panel .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9em;
    }
    .lobby-panel input {
      background: #0f3460;
      border: 1px solid #e94560;
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 1em;
      width: 100%;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 2px;
    }
    .lobby-panel input::placeholder {
      color: #666;
      letter-spacing: normal;
    }
    .lobby-panel button {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-size: 1.1em;
      cursor: pointer;
      margin: 6px;
      transition: background 0.2s;
    }
    .lobby-panel button:hover { background: #c73652; }
    .lobby-panel button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    #lobby-status {
      margin-top: 16px;
      min-height: 24px;
      color: #aaa;
      font-size: 0.9em;
    }
    #game-code-display {
      font-size: 2em;
      color: #e94560;
      letter-spacing: 4px;
      margin: 12px 0;
      font-weight: bold;
    }
    #player-list {
      text-align: left;
      margin: 16px 0;
      padding: 0;
      list-style: none;
    }
    #player-list li {
      padding: 6px 12px;
      background: #0f3460;
      margin: 4px 0;
      border-radius: 4px;
      font-size: 0.95em;
    }
    #player-list li .host-badge {
      color: #e94560;
      font-size: 0.8em;
      margin-left: 8px;
    }
    .lobby-section { margin: 16px 0; }

    /* Name input */
    #name-input {
      letter-spacing: normal !important;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Lobby UI -->
  <div id="lobby">
    <div class="lobby-panel">
      <h1>GrimWar</h1>
      <p class="subtitle">Wizard Arena Combat</p>

      <div class="lobby-section">
        <input type="text" id="name-input" placeholder="Enter your wizard name" maxlength="16" />
      </div>

      <!-- Initial buttons -->
      <div id="lobby-menu">
        <button id="btn-host">Host Game</button>
        <button id="btn-join">Join Game</button>
        <br/>
        <button id="btn-test" style="background:#0f3460; margin-top:12px; font-size:0.9em;">Test Mode (Solo + Bots)</button>
      </div>

      <!-- Join input (hidden initially) -->
      <div id="join-section" style="display:none;">
        <input type="text" id="join-code-input" placeholder="Enter game code" maxlength="6" />
        <button id="btn-join-confirm">Connect</button>
        <button id="btn-back" style="background:#555;">Back</button>
      </div>

      <!-- Host waiting room (hidden initially) -->
      <div id="host-section" style="display:none;">
        <p style="color:#888; font-size:0.85em;">Share this code with other players:</p>
        <div id="game-code-display"></div>
        <ul id="player-list"></ul>
        <button id="btn-start" disabled>Start Game</button>
      </div>

      <!-- Client waiting room -->
      <div id="client-section" style="display:none;">
        <p style="color:#888;">Waiting for host to start...</p>
        <ul id="client-player-list"></ul>
      </div>

      <div id="lobby-status"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
