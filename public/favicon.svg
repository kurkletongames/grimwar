<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#e94560" stroke-width="2" opacity="0.7"/>

  <!-- Wizard hat -->
  <polygon points="32,6 14,42 50,42" fill="#4fc3f7" opacity="0.9"/>
  <polygon points="32,6 14,42 50,42" fill="none" stroke="#3aa3d7" stroke-width="1"/>
  <!-- Hat brim -->
  <ellipse cx="32" cy="42" rx="22" ry="5" fill="#4fc3f7" opacity="0.85"/>
  <!-- Hat band -->
  <rect x="14" y="39" width="36" height="4" rx="1" fill="#e94560" opacity="0.9"/>

  <!-- Fireball (bottom right) -->
  <circle cx="46" cy="50" r="8" fill="#ff4400" opacity="0.5"/>
  <circle cx="46" cy="50" r="6" fill="#ff6600" opacity="0.8"/>
  <circle cx="46" cy="50" r="3" fill="#ffaa00"/>
</svg>
